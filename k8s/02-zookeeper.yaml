apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: log-monitoring
  labels:
    app: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: wurstmeister/zookeeper:latest
          ports:
            - containerPort: 2181
          # Zookeeper readiness: check it responds on its client port
          readinessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper-service
  namespace: log-monitoring
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
      targetPort: 2181
  # ClusterIP = only reachable inside the cluster (Kafka talks to it internally)
  type: ClusterIP
